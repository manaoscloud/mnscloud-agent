name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  agent:
    name: Deno agent
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Setup Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x
      - name: Type check
        run: deno task check
      - name: Shell syntax check
        run: bash -n scripts/*.sh
